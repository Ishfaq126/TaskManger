name: Build Android App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Automated Fixes (URL + SDK + Gradle)
        working-directory: Frontend/App/taskforge
        run: |
          # 1. Fix the Dart SDK requirement
          sed -i 's/sdk: ">=3.8.1/sdk: ">=3.5.0/g' pubspec.yaml

          # 2. Inject your Live Backend URL
          sed -i 's|http://10.72.125.97:4000/api|https://tasks.digibizz.cloud/api|g' lib/utils/constants.dart
          sed -i 's|http://10.72.125.97:4000/graphql|https://tasks.digibizz.cloud/graphql|g' lib/utils/constants.dart

          # 3. Force-fix Hive vs Bloc conflict
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  analyzer: ^6.4.1" >> pubspec.yaml
          echo "  test_api: 0.7.10" >> pubspec.yaml

          # 4. FIX THE GRADLE ERROR: Remove the hardcoded local Java path
          # This looks into your android folder and deletes the line mentioning C:/Program Files
          sed -i '/org.gradle.java.home/d' android/gradle.properties

      - name: Install Dependencies
        working-directory: Frontend/App/taskforge
        run: |
          flutter pub upgrade --major-versions
          flutter pub get
        
      - name: Build APK
        working-directory: Frontend/App/taskforge
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: taskforge-android-app
          path: Frontend/App/taskforge/build/app/outputs/flutter-apk/app-release.apk
